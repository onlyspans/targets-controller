syntax = "proto3";

package targets;

option csharp_namespace = "Targets.Communication";

service TargetsService {
  // BiDi stream: Worker sends metadata + snapshot chunks, TC streams execution results back.
  // Protocol: first message must be DeploymentMetadata, then one or more SnapshotChunk messages.
  rpc ExecuteOnTarget(stream DeploymentInput) returns (stream ExecutionResult);
}

// Streamed from Worker to TC
message DeploymentInput {
  oneof payload {
    DeploymentMetadata metadata = 1;    // must be first message
    SnapshotChunk snapshot_chunk = 2;   // subsequent messages
  }
}

message DeploymentMetadata {
  string deployment_id = 1;
  string target_id = 2;
  string target_type = 3;
  map<string, string> environment_variables = 4;
}

message SnapshotChunk {
  bytes data = 1;
  bool is_last = 2;
}

// Streamed from TC to Worker
message ExecutionResult {
  string deployment_id = 1;
  int64 timestamp = 2;
  ResultType type = 3;
  string message = 4;
  optional bytes data = 5;
}

enum ResultType {
  RESULT_TYPE_UNSPECIFIED = 0;
  RESULT_TYPE_LOG = 1;
  RESULT_TYPE_PROGRESS = 2;
  RESULT_TYPE_SUCCESS = 3;
  RESULT_TYPE_ERROR = 4;
}
